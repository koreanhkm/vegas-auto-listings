<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vegas New Construction</title>
    <style>
      :root{
        --bg: #0b0c10;
        --panel: rgba(255,255,255,.06);
        --panel-2: rgba(255,255,255,.09);
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.72);
        --hair: rgba(255,255,255,.12);
        --accent: #d6b36a;
        --good: #49d17a;
        --shadow: 0 16px 40px rgba(0,0,0,.45);
      }
      * { box-sizing: border-box; }
      body{
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 20% 0%, rgba(214,179,106,.12), transparent 55%),
          radial-gradient(900px 500px at 85% 10%, rgba(73,209,122,.09), transparent 55%),
          linear-gradient(180deg, #090a0f, #0b0c10 35%, #080910);
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      }
      a { color: inherit; }
      .wrap{
        max-width: 980px;
        margin: 0 auto;
        padding: 18px 16px 40px;
      }
      .hero{
        border: 1px solid var(--hair);
        background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
        border-radius: 18px;
        padding: 18px 18px 16px;
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }
      .hero:before{
        content:"";
        position:absolute;
        inset:-2px;
        background:
          radial-gradient(700px 240px at 30% 0%, rgba(214,179,106,.28), transparent 60%),
          radial-gradient(600px 220px at 90% 30%, rgba(255,255,255,.08), transparent 55%);
        pointer-events:none;
      }
      .hero > * { position: relative; }
      .brand{
        display:flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .brand h1{
        margin: 0;
        font-size: 28px;
        letter-spacing: .2px;
      }
      .tagline{
        margin: 6px 0 0;
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 13px;
      }
      .pillbar{
        display:flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
        align-items: center;
      }
      .btn{
        border: 1px solid var(--hair);
        background: rgba(255,255,255,.06);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 999px;
        cursor: pointer;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 13px;
        transition: transform .08s ease, background .15s ease;
      }
      .btn:hover{ background: rgba(255,255,255,.10); }
      .btn:active{ transform: scale(.98); }
      .btn.primary{
        border-color: rgba(214,179,106,.55);
        background: rgba(214,179,106,.16);
      }
      .filters{
        display:flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 12px;
      }
      .filtersSection{
        width: 100%;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .control{
        border: 1px solid var(--hair);
        background: rgba(255,255,255,.05);
        border-radius: 14px;
        padding: 10px 12px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 13px;
        color: var(--text);
      }
      select.control, input.control{ outline: none; }
      select.control{
        color-scheme: dark;
        background-color: rgba(15,16,20,.75);
      }
      select.control option{
        background-color: #0b0c10;
        color: rgba(255,255,255,.92);
      }
      .chips{ display:flex; gap: 8px; flex-wrap: wrap; }
      .chip{
        border: 1px solid var(--hair);
        background: rgba(255,255,255,.05);
        padding: 8px 10px;
        border-radius: 999px;
        cursor:pointer;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
        color: var(--muted);
        user-select:none;
      }
      .chip.on{
        border-color: rgba(214,179,106,.55);
        background: rgba(214,179,106,.18);
        color: var(--text);
      }
      .chip.small{ padding: 7px 9px; font-size: 12px; }
      .meta{
        margin-top: 10px;
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
      }
      .grid{
        margin-top: 16px;
        display:grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .loadMoreWrap{
        margin-top: 14px;
        display:flex;
        justify-content: center;
      }
      .card{
        border: 1px solid var(--hair);
        background: rgba(255,255,255,.04);
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 10px 26px rgba(0,0,0,.32);
        overflow: hidden;
      }
      .cardInner{
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 14px;
        align-items: start;
      }
      @media (max-width: 520px){
        .cardInner{ grid-template-columns: 1fr; }
      }
      .thumb{
        width: 140px;
        aspect-ratio: 1 / 1;
        border-radius: 14px;
        border: 1px solid var(--hair);
        background:
          radial-gradient(300px 160px at 20% 20%, rgba(214,179,106,.18), transparent 60%),
          radial-gradient(260px 140px at 90% 40%, rgba(255,255,255,.08), transparent 55%),
          linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
        overflow: hidden;
        position: relative;
      }
      @media (max-width: 520px){
        .thumb{ width: 100%; aspect-ratio: 16 / 9; }
      }
      .thumb img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
        filter: saturate(1.03) contrast(1.03);
        transform: scale(1.01);
      }
      .thumb:after{
        content:"";
        position:absolute;
        inset:0;
        background: linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.45));
        pointer-events:none;
      }
      .thumb .badge{
        position:absolute;
        left: 10px;
        bottom: 10px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.14);
        background: rgba(0,0,0,.38);
        color: rgba(255,255,255,.92);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
        backdrop-filter: blur(6px);
        z-index: 1;
      }
      .content{ min-width: 0; }
      .kicker{
        display:flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
      }
      .title{
        margin-top: 8px;
        font-size: 22px;
        letter-spacing: .2px;
      }
      .price{
        margin-top: 10px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 22px;
        font-weight: 700;
      }
      .specs{
        display:flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .flags{
        display:flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .flag{
        border: 1px solid var(--hair);
        background: rgba(255,255,255,.06);
        padding: 7px 10px;
        border-radius: 999px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
        color: rgba(255,255,255,.84);
      }
      .flag.good{
        border-color: rgba(73,209,122,.45);
        background: rgba(73,209,122,.12);
      }
      .flag.warn{
        border-color: rgba(214,179,106,.55);
        background: rgba(214,179,106,.12);
      }
      .spec{
        border: 1px solid var(--hair);
        background: rgba(255,255,255,.05);
        padding: 8px 10px;
        border-radius: 999px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
        color: var(--muted);
      }
      .incentive{
        margin-top: 12px;
        border-left: 3px solid rgba(214,179,106,.8);
        background: rgba(214,179,106,.10);
        padding: 10px 12px;
        border-radius: 12px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 13px;
        color: var(--text);
      }
      .incentive .label{
        color: rgba(214,179,106,.95);
        font-weight: 700;
        letter-spacing: .2px;
        margin-right: 6px;
      }
      .actions{
        margin-top: 12px;
        display:flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .link{
        display:inline-flex;
        align-items:center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--hair);
        text-decoration:none;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: rgba(255,255,255,.05);
      }
      .link:hover{ background: rgba(255,255,255,.10); }
      .footer{
        margin-top: 18px;
        color: rgba(255,255,255,.55);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 11px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <div class="brand">
          <div>
            <h1 id="brandName">Your Name Realty</h1>
            <div class="tagline" id="brandTagline">Las Vegas New Construction · Latest incentives & pricing</div>
          </div>
          <div class="pillbar">
            <button class="btn primary" onclick="syncNow()">Sync now</button>
            <button class="btn" onclick="loadListings()">Refresh</button>
          </div>
        </div>

        <div class="filters" aria-label="filters">
          <div class="filtersSection" aria-label="core filters">
            <select id="cityFilter" class="control">
              <option value="">All cities</option>
            </select>

            <select id="areaFilter" class="control">
              <option value="">All areas</option>
            </select>

            <div class="chips" aria-label="beds filter">
              <div class="chip" data-beds="">Any beds</div>
              <div class="chip" data-beds="3">3+</div>
              <div class="chip" data-beds="4">4+</div>
              <div class="chip" data-beds="5">5+</div>
            </div>

            <input id="minPrice" class="control" inputmode="numeric" placeholder="Min price" />
            <input id="maxPrice" class="control" inputmode="numeric" placeholder="Max price" />
            <button class="btn" onclick="applyFilters()">Apply</button>
            <button class="btn" onclick="clearFilters()">Clear</button>
          </div>

          <div class="filtersSection" aria-label="builder filters">
            <div class="chips" id="builderChips" aria-label="builder filter chips"></div>
          </div>
        </div>

        <div id="meta" class="meta"></div>
      </div>

      <div id="list" class="grid"></div>
      <div class="loadMoreWrap">
        <button id="loadMoreBtn" class="btn" style="display:none" onclick="loadMore()">Load more</button>
      </div>
      <div class="footer" id="footerNote"></div>
    </div>

    <script>
      const BRAND = {
        name: "Vegas Korean Homes",
        tagline: "Las Vegas New Construction · Latest incentives & pricing",
        footer:
          "Data is sourced from builder websites. Prices/incentives can change anytime — tap “View details” for the official listing page.",
      };

      const state = {
        all: [],
        filtered: [],
        bedsMin: 0,
        builderSet: new Set(),
        pageSize: 20,
        visibleCount: 20,
      };

      function money(n) {
        const num = Number(n || 0);
        if (!num) return "—";
        return "$" + num.toLocaleString();
      }

      function uniqueSorted(arr) {
        return Array.from(new Set(arr)).sort((a, b) => a.localeCompare(b));
      }

      function normalizeCity(s) {
        const raw = String(s || "").trim();
        if (!raw) return "";
        const lower = raw.toLowerCase();
        if (lower === "las vegas" || lower === "las vegs" || lower === "lasvegas") return "Las Vegas";
        if (lower === "henderson") return "Henderson";
        if (lower === "north las vegas" || lower === "n. las vegas" || lower === "n las vegas") return "North Las Vegas";
        return raw
          .toLowerCase()
          .replace(/\b\w/g, (m) => m.toUpperCase());
      }

      function deriveAreaTag(item) {
        const city = normalizeCity(item.city || "");
        const community = String(item.community || "").toLowerCase();
        const plan = String(item.plan || "").toLowerCase();
        const url = String(item.sourceUrl || "").toLowerCase();
        const text = `${community} ${plan} ${url}`;

        if (city === "Henderson") return "Henderson";
        if (city === "North Las Vegas") return "North Las Vegas";
        if (/(summerlin)/i.test(text)) return "Summerlin";
        if (/(northwest|skye canyon|centennial|aliante)/i.test(text)) return "Northwest";
        if (/(southwest|mountain'?s edge|mountains edge|southern highlands|blue diamond)/i.test(text))
          return "Southwest";
        return "Other";
      }

      async function loadListings() {
        const res = await fetch("/api/listings");
        const data = await res.json();

        window.__lastSyncAt = data.lastSyncAt || "not yet";
        document.getElementById("meta").innerText =
          `Showing: ${Array.isArray(data.items) ? data.items.length : 0} | Total: ${data.count} | Last Sync: ${window.__lastSyncAt}`;

        state.all = Array.isArray(data.items) ? data.items : [];
        hydrateCityFilter(state.all);
        hydrateAreaFilter(state.all);
        hydrateBuilderChips(state.all);
        applyFilters();
      }

      async function syncNow() {
        await fetch("/api/sync", { method: "POST" });
        await loadListings();
      }

      function hydrateCityFilter(items) {
        const cities = uniqueSorted(items.map((i) => normalizeCity(i.city)).filter(Boolean));
        const select = document.getElementById("cityFilter");
        const current = select.value;
        select.innerHTML = `<option value="">All cities</option>` +
          cities.map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
        select.value = cities.includes(current) ? current : "";
      }

      function hydrateAreaFilter(items) {
        const areas = uniqueSorted(items.map((i) => deriveAreaTag(i)).filter(Boolean));
        const select = document.getElementById("areaFilter");
        const current = select.value;
        select.innerHTML = `<option value="">All areas</option>` +
          areas.map((a) => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join("");
        select.value = areas.includes(current) ? current : "";
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function parsePriceInput(id) {
        const raw = document.getElementById(id).value || "";
        const cleaned = raw.replace(/[^\d]/g, "");
        return cleaned ? Number(cleaned) : 0;
      }

      function hydrateBuilderChips(items) {
        const builders = uniqueSorted(items.map((i) => String(i.builder || "").trim()).filter(Boolean));
        const root = document.getElementById("builderChips");
        root.innerHTML = "";

        // All builders chip (clears selection)
        const allChip = document.createElement("div");
        allChip.className = "chip small on";
        allChip.dataset.builder = "";
        allChip.innerText = "All builders";
        allChip.addEventListener("click", () => {
          state.builderSet = new Set();
          setBuilderChipsUI(root);
          applyFilters();
        });
        root.appendChild(allChip);

        builders.forEach((b) => {
          const chip = document.createElement("div");
          chip.className = "chip small";
          chip.dataset.builder = b;
          chip.innerText = b;
          chip.addEventListener("click", () => {
            if (state.builderSet.has(b)) state.builderSet.delete(b);
            else state.builderSet.add(b);
            setBuilderChipsUI(root);
            applyFilters();
          });
          root.appendChild(chip);
        });

        setBuilderChipsUI(root);
      }

      function setBuilderChipsUI(root) {
        const hasSelection = state.builderSet.size > 0;
        root.querySelectorAll(".chip").forEach((el) => {
          const b = el.dataset.builder || "";
          if (!b) el.classList.toggle("on", !hasSelection);
          else el.classList.toggle("on", state.builderSet.has(b));
        });
      }

      function applyFilters() {
        const city = document.getElementById("cityFilter").value;
        const area = document.getElementById("areaFilter").value;
        const minPrice = parsePriceInput("minPrice");
        const maxPrice = parsePriceInput("maxPrice");

        const items = state.all.filter((i) => {
          if (city && normalizeCity(i.city) !== city) return false;
          if (area && deriveAreaTag(i) !== area) return false;
          if (state.bedsMin && Number(i.beds || 0) < state.bedsMin) return false;
          if (state.builderSet.size && !state.builderSet.has(String(i.builder || "").trim())) return false;
          const p = Number(i.price || 0);
          if (minPrice && p && p < minPrice) return false;
          if (maxPrice && p && p > maxPrice) return false;
          return true;
        });

        state.filtered = items;
        state.visibleCount = state.pageSize;
        render();
        document.getElementById("meta").innerText =
          `Showing: ${items.length} | Total: ${state.all.length} | Last Sync: ${window.__lastSyncAt || "—"}`;
      }

      function clearFilters() {
        document.getElementById("cityFilter").value = "";
        document.getElementById("areaFilter").value = "";
        document.getElementById("minPrice").value = "";
        document.getElementById("maxPrice").value = "";
        state.bedsMin = 0;
        state.builderSet = new Set();
        setBuilderChipsUI(document.getElementById("builderChips"));
        setBedsChip("");
        applyFilters();
      }

      function setBedsChip(val) {
        document.querySelectorAll(".chip").forEach((el) => {
          el.classList.toggle("on", el.dataset.beds === val);
        });
      }

      function loadMore() {
        state.visibleCount = Math.min(state.visibleCount + state.pageSize, state.filtered.length);
        render();
      }

      function render() {
        const items = state.filtered.slice(0, state.visibleCount);
        const list = document.getElementById("list");
        list.innerHTML = "";

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "card";
          empty.innerHTML = `<div class="kicker">No results</div><div class="title">Try clearing filters.</div>`;
          list.appendChild(empty);
          return;
        }

        items.forEach((i) => {
          const el = document.createElement("div");
          el.className = "card";
          const city = escapeHtml(normalizeCity(i.city || ""));
          const area = escapeHtml(deriveAreaTag(i));
          const builder = escapeHtml(i.builder || "");
          const community = escapeHtml(i.community || "");
          const plan = escapeHtml(i.plan || "");
          const incentive = (i.incentive || "").trim();
          const sourceUrl = escapeHtml(i.sourceUrl || "#");
          const imageUrl = escapeHtml(i.imageUrl || "");
          const statusRaw = String(i.status || "").trim();
          const badgeRaw = String(i.badge || "").trim();
          const wasPrice = Number(i.wasPrice || 0);
          const price = Number(i.price || 0);
          const priceCut = wasPrice && price && wasPrice > price ? (wasPrice - price) : 0;
          const moveInReady =
            /move[\s-]?in\s*ready/i.test(statusRaw) ||
            /move[\s-]?in\s*ready/i.test(badgeRaw);

          el.innerHTML = `
            <div class="cardInner">
              <div class="thumb">
                ${imageUrl ? `<img src="${imageUrl}" alt="${plan || "Home"}" loading="lazy" />` : ""}
                <div class="badge">${builder}</div>
              </div>
              <div class="content">
                <div class="kicker">
                  <div>${builder} · ${community}</div>
                  <div>${area}${city ? ` · ${city}` : ""}</div>
                </div>
                <div class="title">${plan || "Listing"}</div>
                <div class="price">${money(i.price)}</div>
                <div class="flags">
                  ${moveInReady ? `<div class="flag good">Move‑in ready</div>` : ""}
                  ${priceCut ? `<div class="flag warn">Price cut: ${money(priceCut)}</div>` : ""}
                  ${badgeRaw && !moveInReady ? `<div class="flag">${escapeHtml(badgeRaw)}</div>` : ""}
                </div>
                <div class="specs">
                  <div class="spec">${Number(i.beds || 0) || "—"} bd</div>
                  <div class="spec">${Number(i.baths || 0) || "—"} ba</div>
                  <div class="spec">${Number(i.sqft || 0) ? Number(i.sqft).toLocaleString() : "—"} sqft</div>
                </div>
                ${incentive ? `<div class="incentive"><span class="label">INCENTIVE</span>${escapeHtml(incentive)}</div>` : ""}
                <div class="actions">
                  <a class="link" href="${sourceUrl}" target="_blank" rel="noopener">View details</a>
                </div>
              </div>
            </div>
          `;
          list.appendChild(el);
        });

        const btn = document.getElementById("loadMoreBtn");
        if (state.filtered.length > state.visibleCount) {
          btn.style.display = "inline-flex";
          btn.innerText = `Load more (${state.filtered.length - state.visibleCount} left)`;
        } else {
          btn.style.display = "none";
        }
      }

      function wireEvents() {
        document.querySelectorAll(".chip").forEach((el) => {
          el.addEventListener("click", () => {
            const v = el.dataset.beds || "";
            state.bedsMin = v ? Number(v) : 0;
            setBedsChip(v);
            applyFilters();
          });
        });

        document.getElementById("cityFilter").addEventListener("change", applyFilters);
        document.getElementById("areaFilter").addEventListener("change", applyFilters);
        document.getElementById("minPrice").addEventListener("keydown", (e) => {
          if (e.key === "Enter") applyFilters();
        });
        document.getElementById("maxPrice").addEventListener("keydown", (e) => {
          if (e.key === "Enter") applyFilters();
        });
      }

      function initBrand() {
        document.getElementById("brandName").innerText = BRAND.name;
        document.getElementById("brandTagline").innerText = BRAND.tagline;
        document.getElementById("footerNote").innerText = BRAND.footer;
      }

      // Init
      initBrand();
      setBedsChip("");
      wireEvents();
      loadListings();
    </script>
  </body>
</html>
